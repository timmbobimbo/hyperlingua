name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Cache busting build
        run: |
          JS_HASH=$(sha256sum app/app.js | cut -c1-8)
          CSS_HASH=$(sha256sum app/style.css | cut -c1-8)

          mkdir -p dist/app

          # Copy root website files (not app dir, not git infra, not dist)
          find . -maxdepth 1 \
            ! -name '.' ! -name '.git' ! -name '.github' \
            ! -name 'dist' ! -name 'app' \
            -exec cp -r {} dist/ \;

          # Copy app directory excluding unhashed source files
          find app -maxdepth 1 \
            ! -name 'app' ! -name 'app.js' ! -name 'style.css' \
            -exec cp -r {} dist/app/ \;

          cp app/app.js    "dist/app/app.${JS_HASH}.js"
          cp app/style.css "dist/app/style.${CSS_HASH}.css"

          # Patch app/index.html references
          sed -i "s|src=\"app\.js\"|src=\"app.${JS_HASH}.js\"|g"       dist/app/index.html
          sed -i "s|href=\"style\.css\"|href=\"style.${CSS_HASH}.css\"|g" dist/app/index.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      - uses: actions/deploy-pages@v4
        id: deployment
